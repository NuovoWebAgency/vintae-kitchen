<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ViNTAE Kitchen Cape Town</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h4 class="restaurant-name">ViNTAE KiTCHEN</h4>

  <!-- CATEGORY BUTTONS -->
  <div class="container mb-3 categories">

    <button class="btn btn-primary w-100" data-bs-toggle="modal" data-bs-target="#startersModal">Starters</button>
    <button class="btn btn-primary w-100" data-bs-toggle="modal" data-bs-target="#mainsModal">Mains</button>
    <button class="btn btn-primary w-100" data-bs-toggle="modal" data-bs-target="#dessertsModal">Desserts</button>
    <button class="btn btn-primary w-100" data-bs-toggle="modal" data-bs-target="#drinksModal">Drinks</button>

  </div>

  <!-- HERO -->
  <div class="container">
    <div class="card hero-card">
      <img src="fancy-restaurant.jpg" class="img-fluid" alt="restaurant">
      <span class="ratings"><i class="fa-solid fa-star"></i> 4.8</span>
    </div>

    <div class="status">
      <span id="statusDot" class="dot"></span>
      <span id="statusText">Checking...</span>
    </div>
  </div>

  <!-- SUBTITLE -->
  <div class="container" id="subtitle">
    <p>We serve flavour-packed dishes made by our head chef. Come on in.</p>
  </div>

  <!-- POPULAR -->
  <div class="container" id="popular-dishes">
    <p>Our New Cocktails</p>
  </div>

  <div class="container">
    <div class="row g-2">

      <div class="col-6">
        <div class="item-card text-center">
          <img src="trinh-minh-th-9cPdsa-_7PI-unsplash.jpg" class="img-fluid">
          <p>Bloody Mary<br>75</p>
        </div>
      </div>

      <div class="col-6">
        <div class="item-card text-center">
          <img src="emily-andreeva-hXg4gGjIfhw-unsplash.jpg" class="img-fluid">
          <p>Gin Sour<br>85</p>
        </div>
      </div>

    </div>
  </div>

  <!-- FOOTER -->
  <footer class="container footer">
    <div>&copy; 2026 ViNTAE KiTCHEN</div>
    <div class="socials">
      <i class="fa-brands fa-whatsapp"></i>
      <i class="fa-brands fa-instagram"></i>
      <i class="fa-brands fa-facebook"></i>
      <i class="fa-brands fa-tiktok"></i>
    </div>
  </footer>

  <!-- FIXED BUTTON (ONLY BUTTON HERE) -->
  <div class="fixed-bottom p-3">
    <button class="btn btn-primary w-100 py-3 fs-4"
      data-bs-toggle="modal"
      data-bs-target="#bookingModal">
      Reserve a table
    </button>
  </div>


  <!-- ================= MODALS ================= -->

  <!-- STARTERS -->
  <div class="modal fade" id="startersModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">Starters</div>
        <div class="modal-body">
          <h6>Fat Greek Flatbread <span>90</span></h6>
          <p>Flatbread, halloumi, tzatziki</p>
        </div>
      </div>
    </div>
  </div>

  <!-- MAINS -->
  <div class="modal fade" id="mainsModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">Main Courses</div>
        <div class="modal-body"></div>
      </div>
    </div>
  </div>

  <!-- DESSERTS -->
  <div class="modal fade" id="dessertsModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">Desserts</div>
        <div class="modal-body"></div>
      </div>
    </div>
  </div>

  <!-- DRINKS -->
  <div class="modal fade" id="drinksModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">Drinks</div>
        <div class="modal-body"></div>
      </div>
    </div>
  </div>

  <!-- BOOKING -->
  <div class="modal fade" id="bookingModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">Table Reservation</div>

        <div class="modal-body">
          <input class="form-control mb-2" placeholder="Name">
          <input type="date" class="form-control mb-2">

          <select class="form-select mb-2">
            <option>Time</option>
            <option>18:00</option>
            <option>19:00</option>
          </select>

          <select class="form-select mb-2">
            <option>Guests</option>
            <option>1</option>
            <option>2</option>
            <option>3+</option>
          </select>

          <button class="btn btn-success w-100">Submit</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
